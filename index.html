<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Fitwalla Family Tree</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <header>
    <div class="header-title">الأسرة · <span>Family</span></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search" placeholder="Search family member…" autocomplete="off" />
    </div>
    <div class="zoom-controls">
      <button class="zoom-btn" id="zoom-in">+</button>
      <button class="zoom-btn" id="zoom-out">−</button>
      <button class="zoom-btn" id="zoom-reset" title="Reset">⌂</button>
    </div>
  </header>

  <div id="canvas-wrap">
    <div id="canvas">
      <svg id="connectors"></svg>
    </div>
  </div>

  <div id="overlay"></div>

  <div id="side-panel">
    <div class="panel-header">
      <div class="panel-avatar" id="panel-avatar"></div>
      <div style="flex:1">
        <div class="panel-name" id="panel-name"></div>
        <span class="panel-gender-tag" id="panel-gender-tag"></span>
      </div>
      <button class="panel-close" id="panel-close">✕</button>
    </div>
    <div class="panel-body" id="panel-body"></div>
  </div>

  <div class="legend">
    <div class="legend-row"><div class="legend-dot" style="background:var(--male)"></div> Male</div>
    <div class="legend-row"><div class="legend-dot" style="background:var(--female)"></div> Female</div>
    <div class="legend-row"><div class="legend-line" style="background:var(--gold)"></div> Married</div>
    <div class="legend-row"><div class="legend-line" style="background:var(--connector);border-top:2px dashed var(--connector)"></div> Parent–Child</div>
  </div>

  <!-- Scripts loaded in dependency order -->
  <script src="data.js"></script>
  <script src="helpers.js"></script>
  <script src="layout.js"></script>
  <script src="app.js"></script>

</body>

</html>
